name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Compile modules
        run: python -m compileall work_memory tests examples scripts
      - name: Run offline demo
        run: python examples/run_offline_demo.py
      - name: Type check
        run: python -m mypy work_memory
